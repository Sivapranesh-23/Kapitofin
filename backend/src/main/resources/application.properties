# ===== Server =====
server.port=8080
spring.application.name=budget-management-system

# ===== Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/budget_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=2002
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# ===== App / JWT =====
app.jwt.secret=YmVkZ2V0LW1hbmFnZW1lbnQtc3lzdGVtLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLXZlcnktbG9uZw==
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ===== Approval thresholds (USD) =====
app.approval.l2-threshold=25000
app.approval.l3-threshold=100000
app.approval.alert-threshold=0.9

# Seed demo data on startup (idempotent)
app.seed-data=true
